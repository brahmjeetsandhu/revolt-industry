name: Build and deploy Node.js app to Azure Web App - revolt-industry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run build

      - name: Upload source for Azure
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          include-hidden-files: false

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1ECC08CA4E8448199E5BE3CE9B512B8A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1A52046B79774BDC9841019762DBB84C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8669D3C668644A3FA15A08EB975C5690 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        timeout-minutes: 15
        with:
          app-name: revolt-industry
          slot-name: Production
          package: .